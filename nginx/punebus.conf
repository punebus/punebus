# =========================================================================
# Nginx Configuration for PuneBus (HTTP - Port 80)
# =========================================================================
# This configuration file defines the server blocks for all subdomains.
# Run `sudo certbot --nginx` after DNS configuration is complete to
# automatically upgrade all of these blocks to HTTPS.

# 1. Main Frontend Web App (punebus.com & www.punebus.com)
server {
    listen 80;
    listen [::]:80;
    server_name punebus.com www.punebus.com;

    root /var/www/punebus/frontend;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Handle SPA routing (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_log /var/log/nginx/punebus_frontend_error.log;
    access_log /var/log/nginx/punebus_frontend_access.log;
}

