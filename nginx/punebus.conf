# 5. Backend Express API Reverse Proxy (api.punebus.com)
server {
    listen 80;
    listen [::]:80;
    server_name api.punebus.com;

    # Handle file uploads and large payloads if necessary
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_log /var/log/nginx/punebus_api_error.log;
    access_log /var/log/nginx/punebus_api_access.log;
}
